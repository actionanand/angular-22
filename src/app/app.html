<main class="page" [attr.data-theme]="selectedTheme()">
  <div class="topbar">
    <app-theme-switcher
      [themes]="themes"
      [selectedTheme]="selectedTheme()"
      (themeSelected)="selectTheme($event)"
    />
  </div>

  <section class="hero" aria-labelledby="page-title">
    <div class="hero__content">
      <p class="hero__eyebrow">{{ content.eyebrow }}</p>
      <h1 id="page-title">{{ content.title }}</h1>
      <p>{{ content.description }}</p>
    </div>

    <div class="hero__panel" [attr.aria-label]="content.currentFocusAriaLabel">
      <span>{{ content.currentFocusLabel }}</span>
      <strong>{{ selectedRelease().label }}</strong>
      <p>{{ selectedRelease().theme }}</p>
    </div>
  </section>

  <app-summary-panel [releases]="releases" />

  <section class="section" [attr.aria-label]="content.releasePickerLabel">
    <app-release-timeline
      [releases]="releases"
      [selectedKey]="selectedKey()"
      (selected)="selectRelease($event)"
    />
  </section>

  <section class="section">
    <app-release-detail [release]="selectedRelease()" />
  </section>

  <section class="section">
    <app-compare-panel [releases]="releases" />
  </section>
</main>
